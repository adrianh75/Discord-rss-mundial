name: Mundial Live Scores Monitor

on:
  schedule:
    # Se despierta de forma automática cada 5 minutos
    - cron: '*/5 * * * *'
  workflow_dispatch: # Te permite forzar la ejecución manual desde GitHub

jobs:
  check-scores:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalar dependencias
      run: npm install

    - name: Ejecutar monitor de partidos
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: node index.js

    - name: Guardar estado si hubo cambios
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add match_state.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Actualizar marcadores [skip ci]" && git push)
