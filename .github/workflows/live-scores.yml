name: Mundial Live Scores Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

# Forzamos globalmente que todas las acciones de JavaScript usen Node 24 internamente
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check-scores:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Instalar dependencias
      run: npm install axios

    - name: Ejecutar monitor de partidos
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: node index.js
      
- name: Diagnóstico directo de Webhook
      run: |
        curl -H "Content-Type: application/json" \
             -X POST \
             -d '{"content": "🚨 ¡Prueba de conexión directa desde GitHub Actions exitosa!"}' \
             ${{ secrets.DISCORD_WEBHOOK_URL }}
